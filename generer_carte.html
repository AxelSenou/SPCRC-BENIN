<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPCRC-Bénin | Prédiction du rendement</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg: #f4f8f4;
      --card: #ffffff;
      --accent: #2e7d32;
      --accent-2: #66bb6a;
      --text: #1b2a1b;
      --muted: #5f6f5f;
      --danger: #c62828;
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #f7fdf7, #eaf7ea);
      color: var(--text);
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      color: white;
      border-radius: 24px;
      padding: 28px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }

    .hero h1 { margin: 0 0 8px; font-size: 1.9rem; }
    .hero p { margin: 0; opacity: 0.95; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 20px;
      box-shadow: var(--shadow);
    }

    form label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 0.95rem;
      color: var(--muted);
    }

    input, select {
      border: 1px solid #c6dcc6;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.95rem;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.12);
    }

    button {
      margin-top: 16px;
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 600;
      cursor: pointer;
      background: var(--accent);
      color: white;
    }

    button:hover { filter: brightness(1.05); }

    .result {
      margin-top: 16px;
      padding: 16px;
      border-radius: 16px;
      background: #f5fff6;
      border: 1px solid #cfe8d2;
    }

    .result.success { border-color: #70b97b; }
    .result.error { border-color: #eea3a3; background: #fff7f8; }

    .result h3 { margin-top: 0; margin-bottom: 8px; }

    .stat {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #eef2ee;
    }

    .stat:last-child { border-bottom: none; }

    ul { padding-left: 18px; }
    li { margin-bottom: 8px; }

    .muted { color: var(--muted); }
    .hidden { display: none; }
    #map {
      height: 420px;
      width: 100%;
      margin-top: 18px;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.04);
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <h1>SPCRC-Bénin</h1>
      <p>Interface web pour visualiser les résultats de l’API de prédiction du rendement cotonnier.</p>
    </section>

    <section class="card">
      <h2>Prédire un rendement</h2>
      <form id="predictionForm">
        <div class="grid">
          <label>Commune
            <input name="Commune" placeholder="PARAKOU" required />
          </label>
          <label>Année
            <input name="Annee" type="number" value="2026" />
          </label>
          <label>Pluie saison semis (mm)
            <input name="Pluie_Semis_mm" type="number" value="250" />
          </label>
          <label>Pluie floraison (mm)
            <input name="Pluie_Floraison_mm" type="number" value="320" />
          </label>
          <label>Pluie maturation (mm)
            <input name="Pluie_Maturation_mm" type="number" value="280" />
          </label>
          <label>Pluie totale (mm)
            <input name="Pluie_Totale_mm" type="number" value="850" />
          </label>
          <label>Temp. max moyenne (°C)
            <input name="Temp_Max_Moy_C" type="number" value="33" />
          </label>
          <label>Temp. min moyenne (°C)
            <input name="Temp_Min_Moy_C" type="number" value="24" />
          </label>
          <label>Humidité relative (%)
            <input name="Humidite_Relative_Perc" type="number" value="70" />
          </label>
          <label>Radiation solaire (MJ)
            <input name="Radiation_Solaire_MJ" type="number" value="18" />
          </label>
          <label>ETP (mm)
            <input name="ETP_mm" type="number" value="110" />
          </label>
          <label>Bilan hydrique (mm)
            <input name="Bilan_Hydrique_mm" type="number" value="40" />
          </label>
          <label>Jours secs semis
            <input name="Max_Jours_Secs_Semis" type="number" value="6" />
          </label>
          <label>Jours secs floraison
            <input name="Max_Jours_Secs_Floraison" type="number" value="4" />
          </label>
          <label>Jours secs maturation
            <input name="Max_Jours_Secs_Maturation" type="number" value="5" />
          </label>
          <label>pH du sol
            <input name="pH_Sol" type="number" value="6.2" step="0.1" />
          </label>
          <label>Argile (%)
            <input name="Argile_Perc" type="number" value="18" />
          </label>
          <label>Azote (g/kg)
            <input name="Azote_g_kg" type="number" value="1.2" step="0.1" />
          </label>
        </div>
        <button type="submit">Envoyer la prédiction</button>
      </form>

      <div id="resultBox" class="result hidden"></div>
      <div id="map"></div>
    </section>

    <section class="card" style="margin-top: 24px;">
      <h2>Historique récent</h2>
      <ul id="historyList">
        <li class="muted">Chargement en cours…</li>
      </ul>
    </section>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const form = document.getElementById('predictionForm');
    const resultBox = document.getElementById('resultBox');
    const historyList = document.getElementById('historyList');

    const communeCoords = {
      PARAKOU: [9.35, 2.62],
      COTONOU: [6.36, 2.44],
      BOHICON: [7.18, 2.07],
      PORTO_NOVO: [6.49, 2.63],
      NIKKI: [9.93, 3.20],
      KANDI: [11.13, 2.93],
      ABOMEY: [7.18, 1.99],
      MALANVILLE: [11.87, 3.38],
      DJOUGOU: [9.70, 1.67],
      TCHAOUROU: [8.88, 2.59],
      BEMBEREKE: [10.24, 2.66]
    };

    const map = L.map('map').setView([9.3, 2.3], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let marker = null;

    function updateMap(commune, rendement, categorie) {
      const coords = communeCoords[commune.toUpperCase()] || [9.3, 2.3];
      if (marker) {
        map.removeLayer(marker);
      }
      marker = L.marker(coords).addTo(map);
      marker.bindPopup(`<strong>${commune}</strong><br>Rendement: ${rendement} kg/ha<br>Catégorie: ${categorie}`).openPopup();
      map.setView(coords, 8);
    }

    function buildPayload(formData) {
      const payload = {};
      for (const [key, value] of formData.entries()) {
        if (!key) continue;
        payload[key] = value;
      }

      payload.Commune = String(payload.Commune || '').toUpperCase().trim();
      payload.Annee = Number(payload.Annee || 2026);

      for (const key of Object.keys(payload)) {
        if (key === 'Commune') continue;
        const raw = payload[key];
        if (raw === '' || raw === null || raw === undefined) {
          payload[key] = null;
        } else if (!isNaN(raw)) {
          payload[key] = Number(raw);
        }
      }

      return payload;
    }

    async function loadHistory() {
      try {
        const response = await fetch('/historique');
        const data = await response.json();
        const items = data.historique || [];
        if (!items.length) {
          historyList.innerHTML = '<li class="muted">Aucun historique disponible pour le moment.</li>';
          return;
        }

        historyList.innerHTML = items.map(item => `
          <li>
            <strong>${item.commune}</strong> — rendement: ${item.rendement} kg/ha,
            catégorie: ${item.categorie}, modèle: ${item.modele}
          </li>
        `).join('');
      } catch (error) {
        historyList.innerHTML = '<li class="muted">Impossible de charger l’historique.</li>';
      }
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const payload = buildPayload(new FormData(form));

      resultBox.className = 'result';
      resultBox.innerHTML = '<p class="muted">Envoi en cours…</p>';

      try {
        const response = await fetch('/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const result = await response.json();
        if (!result.success) {
          resultBox.classList.add('error');
          resultBox.innerHTML = `<h3>Erreur</h3><p>${result.error || 'La prédiction a échoué.'}</p>`;
          return;
        }

        resultBox.classList.add('success');
        resultBox.innerHTML = `
          <h3>Résultat de la prédiction</h3>
          <div class="stat"><span>Commune</span><strong>${payload.Commune}</strong></div>
          <div class="stat"><span>Rendement estimé</span><strong>${result.rendement} kg/ha</strong></div>
          <div class="stat"><span>Catégorie</span><strong>${result.categorie}</strong></div>
          <div class="stat"><span>Modèle utilisé</span><strong>${result.modele_utilise}</strong></div>
        `;
        updateMap(payload.Commune, result.rendement, result.categorie);
        await loadHistory();
      } catch (error) {
        resultBox.classList.add('error');
        resultBox.innerHTML = '<h3>Erreur</h3><p>Impossible d’atteindre l’API.</p>';
      }
    });

    updateMap('BENIN', 0, 'À définir');
    loadHistory();
  </script>
</body>
</html>
